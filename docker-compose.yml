version: "3.8"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
      POSTGRES_DB: pipeline_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d pipeline_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  airflow-init:
    build: .
    environment:
      PYTHONPATH: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__FERNET_KEY: "MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE="
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://etl_user:etl_pass@postgres:5432/airflow_db"
      ETL_DB_HOST: postgres
      ETL_DB_PORT: "5432"
      ETL_DB_NAME: pipeline_db
      ETL_DB_USER: etl_user
      ETL_DB_PASSWORD: etl_pass
    working_dir: /opt/airflow
    volumes:
      - ./:/opt/airflow
    depends_on:
      - postgres
    command: >
      bash -lc "airflow db migrate && airflow users create --username airflow --password airflow --firstname Airflow --lastname Admin --role Admin --email airflow@example.com"

  airflow-webserver:
    build: .
    environment:
      PYTHONPATH: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__FERNET_KEY: "MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE="
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://etl_user:etl_pass@postgres:5432/airflow_db"
      ETL_DB_HOST: postgres
      ETL_DB_PORT: "5432"
      ETL_DB_NAME: pipeline_db
      ETL_DB_USER: etl_user
      ETL_DB_PASSWORD: etl_pass
    working_dir: /opt/airflow
    volumes:
      - ./:/opt/airflow
    depends_on:
      - airflow-init
    command: webserver
    ports:
      - "8080:8080"

  airflow-scheduler:
    build: .
    environment:
      PYTHONPATH: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__FERNET_KEY: "MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE="
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://etl_user:etl_pass@postgres:5432/airflow_db"
      ETL_DB_HOST: postgres
      ETL_DB_PORT: "5432"
      ETL_DB_NAME: pipeline_db
      ETL_DB_USER: etl_user
      ETL_DB_PASSWORD: etl_pass
    working_dir: /opt/airflow
    volumes:
      - ./:/opt/airflow
    depends_on:
      - airflow-init
    command: scheduler

  etl-cli:
    build: .
    environment:
      PYTHONPATH: /opt/airflow
      ETL_DB_HOST: postgres
      ETL_DB_PORT: "5432"
      ETL_DB_NAME: pipeline_db
      ETL_DB_USER: etl_user
      ETL_DB_PASSWORD: etl_pass
    working_dir: /opt/airflow
    volumes:
      - ./:/opt/airflow
    command: python -m src.main all
    profiles: ["tools"]

  dashboard:
    build: .
    environment:
      PYTHONPATH: /opt/airflow
      DASHBOARD_DB_CONNECTION_STRING: postgresql+psycopg2://etl_user:etl_pass@postgres:5432/pipeline_db
    working_dir: /opt/airflow
    volumes:
      - ./:/opt/airflow
    depends_on:
      - postgres
    command: streamlit run app/dashboard.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    profiles: ["dashboard"]

volumes:
  postgres-data: {}

